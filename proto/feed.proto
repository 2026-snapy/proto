syntax = "proto3";

package feed;

option java_multiple_files = true;
option java_package = "com.2026.snapy.proto.feed";
option java_outer_classname = "FeedProto";

option go_package = "go/feed;feed";

message RecommendRequest {
    int64 user_id = 1;
    int64 cursor = 2;
    int32 size = 3;
}

message RecommendResponse {
    repeated int64 album_ids = 1;
}

service RecommendService {
    rpc RecommendFeed(RecommendRequest) returns(RecommendResponse);
}