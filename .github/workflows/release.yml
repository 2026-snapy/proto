name: Auto Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in java/build.gradle
        run: |
          sed -i "s/^version = '.*'/version = '${{ steps.extract.outputs.version }}'/" java/build.gradle
          grep "^version" java/build.gradle

      - name: Upload bumped build.gradle
        uses: actions/upload-artifact@v4
        with:
          name: bumped-gradle
          path: java/build.gradle

  java-ci:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download bumped build.gradle
        uses: actions/download-artifact@v4
        with:
          name: bumped-gradle
          path: java/

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build with Gradle
        working-directory: java
        run: |
          chmod +x gradlew
          ./gradlew build

  go-protoc:
    needs: java-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc-gen-go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate Go code
        run: protoc --go_out=. --go-grpc_out=. proto/*.proto

      - name: Upload generated Go code
        uses: actions/upload-artifact@v4
        with:
          name: generated-go
          path: go/

  commit-and-release:
    needs: [bump-version, go-protoc]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bumped build.gradle
        uses: actions/download-artifact@v4
        with:
          name: bumped-gradle
          path: java/

      - name: Download generated Go code
        uses: actions/download-artifact@v4
        with:
          name: generated-go
          path: go/

      - name: Commit and move tag to main
        env:
          VERSION: ${{ needs.bump-version.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add java/build.gradle go/
          git commit -m "release: ${TAG}"
          git push origin main
          git tag -f "${TAG}"
          git push -f origin "${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
